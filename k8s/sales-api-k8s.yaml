apiVersion: v1
kind: ConfigMap
metadata:
  name: sales-api-config
  namespace: default
data:
  INVENTORY_API_URL: "http://inventory-api-srv:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-api-deploy
  namespace: default
  labels:
    app: sales-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sales-api
  template:
    metadata:
      labels:
        app: sales-api
    spec:
      containers:
      - name: sales-api
        image: mokachin123/pdv-sales-api:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        env:
        - name: INVENTORY_API_URL
          valueFrom:
            configMapKeyRef:
              name: sales-api-config
              key: INVENTORY_API_URL
        - name: DB_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: sales-api-secrets
              key: DB_CONNECTION_STRING
        livenessProbe:
          httpGet:
            path: /api/sales/payment-methods
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/sales/payment-methods
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sales-api-srv
  namespace: default
spec:
  selector:
    app: sales-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
